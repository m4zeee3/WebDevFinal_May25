<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashier POS – Roots</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/cashier.css">
</head>
<body class="cashier-body">

<!-- ===== TOP NAV ===== -->
<nav class="cashier-nav">
  <a href="#" class="logo">
    <span class="logo-roots">Roots</span>
    <span class="logo-sub">Coffee &amp; Craft</span>
  </a>
  <div class="cashier-nav-right">
    <span><i class="fa-solid fa-circle-user"></i> <strong id="cashierName">—</strong></span>
    <span id="posDate" style="opacity:.6"></span>
    <button class="btn btn-secondary btn-sm" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
</nav>

<!-- ===== POS LAYOUT ===== -->
<div class="pos-wrapper">

  <!-- LEFT: Menu -->
  <div class="menu-panel">
    <div class="menu-top">
      <input type="text" class="menu-search" id="posSearch" placeholder="🔍 Search menu…">
      <div class="pos-cat-tabs" id="posCatTabs">
        <button class="pos-cat-tab active" data-cat="All">All</button>
        <button class="pos-cat-tab" data-cat="Appetizer">Appetizer</button>
        <button class="pos-cat-tab" data-cat="Main Course">Main Course</button>
        <button class="pos-cat-tab" data-cat="Drinks">Drinks</button>
        <button class="pos-cat-tab" data-cat="Dessert">Dessert</button>
        <button class="pos-cat-tab" data-cat="Specialty">Specialty</button>
      </div>
    </div>
    <div class="menu-grid-wrap">
      <div class="menu-grid" id="menuGrid">
        <div class="spinner-center"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Cart Panel -->
  <div class="cart-panel">

    <!-- Tab switcher -->
    <div style="display:flex;border-bottom:2px solid var(--border);background:#fff">
      <button id="tabWalkin" onclick="switchTab('walkin')"
        style="flex:1;padding:12px 8px;border:none;background:none;font-weight:700;font-size:.82rem;
        cursor:pointer;color:var(--brown-dark);border-bottom:3px solid var(--brown-dark);margin-bottom:-2px">
        <i class="fa-solid fa-cash-register"></i> Walk-in Order
      </button>
      <button id="tabOnline" onclick="switchTab('online')"
        style="flex:1;padding:12px 8px;border:none;background:none;font-weight:700;font-size:.82rem;
        cursor:pointer;color:var(--text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;position:relative">
        <i class="fa-solid fa-list-check"></i> All Orders
        <span id="onlineBadge" style="display:none;position:absolute;top:6px;right:18px;
          background:var(--danger);color:#fff;border-radius:10px;font-size:.65rem;
          padding:1px 6px;font-weight:700">0</span>
      </button>
    </div>

    <!-- Walk-in tab -->
    <div id="panelWalkin">
      <div class="cart-panel-header">
        <h3><i class="fa-solid fa-cash-register"></i> Current Order</h3>
        <small id="cartItemCount">0 item(s)</small>
      </div>

      <div class="pos-cart-items" id="posCartItems">
        <div class="pos-cart-empty">
          <i class="fa-solid fa-mug-hot"></i>
          <p>No items yet</p>
          <p style="font-size:.75rem">Click a menu item to add</p>
        </div>
      </div>

      <div class="cart-totals">
        <div class="totals-row"><span>Subtotal</span><span id="posSubtotal">₱0.00</span></div>
        <div class="totals-row grand"><span>TOTAL</span><span id="posTotal">₱0.00</span></div>
      </div>

      <div class="cash-section">
        <label for="cashInput"><i class="fa-solid fa-money-bill-wave"></i> Cash Received</label>
        <input type="number" id="cashInput" class="cash-input" placeholder="0.00" min="0" step="0.01" oninput="calcChange()">
        <div class="change-display" id="changeDisplay"></div>
      </div>

      <div class="checkout-actions">
        <button class="btn btn-primary btn-block btn-lg" id="posCheckoutBtn" onclick="processCheckout()" disabled>
          <i class="fa-solid fa-circle-check"></i> Checkout
        </button>
        <button class="btn btn-secondary btn-block" onclick="clearCart()">
          <i class="fa-solid fa-trash"></i> Clear Order
        </button>
      </div>
    </div>

    <!-- Online Orders tab -->
    <div id="panelOnline" style="display:none;flex-direction:column;height:100%">
      <div class="cart-panel-header" style="justify-content:space-between">
        <h3><i class="fa-solid fa-list-check"></i> All Orders</h3>
        <button class="btn btn-secondary btn-sm" onclick="loadOnlineOrders()">
          <i class="fa-solid fa-rotate"></i> Refresh
        </button>
      </div>
      <div id="onlineOrdersList" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px">
        <div class="pos-cart-empty"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<!-- ===== RECEIPT MODAL ===== -->
<div class="modal-overlay" id="receiptModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3><i class="fa-solid fa-receipt"></i> Receipt</h3>
      <button class="modal-close" onclick="closeReceipt()">✕</button>
    </div>
    <div class="modal-body">
      <div class="receipt" id="receiptContent"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeReceipt()">Close</button>
      <button class="btn btn-primary" onclick="window.print()">
        <i class="fa-solid fa-print"></i> Print
      </button>
    </div>
  </div>
</div>

<!-- Collect Payment Modal -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3><i class="fa-solid fa-peso-sign"></i> Collect Payment</h3>
      <button class="modal-close" onclick="closePaymentModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--cream);border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:.8rem;color:var(--text-muted)">Order</span>
          <strong id="pmOrderId" style="color:var(--brown-dark)"></strong>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:.8rem;color:var(--text-muted)">Customer</span>
          <span id="pmCustomer" style="font-weight:600"></span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:.8rem;color:var(--text-muted)">Status</span>
          <span id="pmStatus" class="badge"></span>
        </div>
        <hr style="border-color:var(--border);margin:10px 0">
        <div id="pmItems" style="font-size:.82rem;display:flex;flex-direction:column;gap:4px"></div>
        <hr style="border-color:var(--border);margin:10px 0">
        <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:800;color:var(--brown-dark)">
          <span>TOTAL</span>
          <span id="pmTotal"></span>
        </div>
      </div>

      <div class="cash-section" style="background:none;padding:0;border:none">
        <label for="pmCashInput"><i class="fa-solid fa-money-bill-wave"></i> Cash Received</label>
        <input type="number" id="pmCashInput" class="cash-input" placeholder="0.00" min="0" step="0.01" oninput="calcPaymentChange()">
        <div class="change-display" id="pmChangeDisplay"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePaymentModal()">Cancel</button>
      <button class="btn btn-primary" id="pmCollectBtn" onclick="confirmPayment()">
        <i class="fa-solid fa-circle-check"></i> Collect & Complete
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../js/confirm.js"></script>
<script src="../js/cashier.js"></script>
</body>
</html>
