<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – Roots Admin</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
<div class="admin-wrapper">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="dashboard.html" class="logo"><span class="logo-roots">Roots</span><span class="logo-sub">Coffee &amp; Craft</span></a>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="dashboard.html"  class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="orders.html"     class="nav-link"><i class="fa-solid fa-receipt"></i> Orders</a>
      <span class="nav-section-label">Catalog</span>
      <a href="products.html"   class="nav-link active"><i class="fa-solid fa-mug-hot"></i> Products</a>
      <a href="inventory.html"  class="nav-link"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
      <span class="nav-section-label">Records</span>
      <a href="history.html"    class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> Order History</a>
      <a href="reports.html"    class="nav-link"><i class="fa-solid fa-chart-simple"></i> Reports</a>
      <a href="analytics.html"  class="nav-link"><i class="fa-solid fa-chart-line"></i> Analytics</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><i class="fa-solid fa-circle-user"></i><div><span id="userName">—</span><strong id="userRole" style="font-size:.7rem;color:var(--brown-light)"></strong></div></div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="d-flex align-center">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
        <h1><i class="fa-solid fa-mug-hot" style="color:var(--brown-light)"></i> Product Management</h1>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">
        <i class="fa-solid fa-plus"></i> Add Product
      </button>
    </header>

    <main class="page-content">

      <div class="filters-bar">
        <input type="text" id="searchProd" placeholder="Search products…" style="flex:1;max-width:260px" oninput="filterProducts()">
        <select id="filterCat" onchange="filterProducts()">
          <option value="">All Categories</option>
          <option>Appetizer</option><option>Main Course</option>
          <option>Drinks</option><option>Dessert</option><option>Specialty</option>
        </select>
        <select id="filterAvail" onchange="filterProducts()">
          <option value="">All Status</option>
          <option value="1">Available</option>
          <option value="0">Unavailable</option>
        </select>
      </div>

      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Available</th><th>Actions</th></tr>
            </thead>
            <tbody id="productsBody">
              <tr><td colspan="7" class="text-center text-muted" style="padding:40px">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="modalTitle">Add Product</h3>
      <button class="modal-close" onclick="closeProductModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editID">
      <div class="form-row">
        <div class="form-group">
          <label>Product Name <span style="color:red">*</span></label>
          <input type="text" id="pName" class="form-control" placeholder="e.g. Caramel Macchiato" maxlength="100">
        </div>
        <div class="form-group">
          <label>Category <span style="color:red">*</span></label>
          <select id="pCat" class="form-control">
            <option value="">Select category</option>
            <option>Appetizer</option><option>Main Course</option>
            <option>Drinks</option><option>Dessert</option><option>Specialty</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₱) <span style="color:red">*</span></label>
          <input type="number" id="pPrice" class="form-control" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" id="pQty" class="form-control" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label>Image URL (optional)</label>
        <input type="url" id="pImage" class="form-control" placeholder="https://… or leave blank">
        <div class="img-preview" id="imgPreview">
          <span style="font-size:3rem;opacity:.4">☕</span>
        </div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="pAvail" checked style="width:16px;height:16px">
          Available on menu
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeProductModal()">Cancel</button>
      <button class="btn btn-primary" id="saveProductBtn" onclick="saveProduct()">
        <i class="fa-solid fa-floppy-disk"></i> Save
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../js/admin-products.js"></script>
</body>
</html>
