<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roots – Login</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

<div class="login-page">
  <div class="login-card">
    <a href="#" class="logo" style="justify-content:center;margin-bottom:6px">
      <span class="logo-roots">Roots</span>
      <span class="logo-sub">Coffee &amp; Craft</span>
    </a>
    <p class="login-subtitle">Staff Login Portal</p>
    <h2>Welcome Back</h2>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm" autocomplete="off" style="margin-top:20px;text-align:left">
      <div class="form-group">
        <label for="username"><i class="fa-solid fa-user"></i> Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
    </form>

    <p class="text-muted mt-2" style="font-size:.75rem;text-align:center">
      Customer? <a href="../index.html" style="color:var(--brown-dark);font-weight:600">Order here →</a>
    </p>
  </div>
</div>

<div id="toast"></div>

<script>
  // Redirect if already logged in
  async function checkSession() {
    try {
      const res  = await fetch('../api/auth.php?action=check');
      const data = await res.json();
      if (data.logged_in) redirectByRole(data.role);
    } catch {}
  }

  function redirectByRole(role) {
    if (role === 'admin')   window.location.href = 'dashboard.html';
    else if (role === 'cashier') window.location.href = '../cashier/index.html';
  }

  checkSession();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Logging in…';

    try {
      const res  = await fetch('../api/auth.php?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();

      if (data.success) {
        redirectByRole(data.role);
      } else {
        errEl.textContent = data.message || 'Login failed';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
      }
    } catch {
      errEl.textContent = 'Network error – please try again';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
    }
  });
</script>
</body>
</html>
