<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics – Roots Admin</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="admin-body">
<div class="admin-wrapper">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="dashboard.html" class="logo"><span class="logo-roots">Roots</span><span class="logo-sub">Coffee &amp; Craft</span></a>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="dashboard.html"  class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="orders.html"     class="nav-link"><i class="fa-solid fa-receipt"></i> Orders</a>
      <a href="qrcodes.html"    class="nav-link"><i class="fa-solid fa-qrcode"></i> QR Codes</a>
      <span class="nav-section-label">Catalog</span>
      <a href="products.html"   class="nav-link"><i class="fa-solid fa-mug-hot"></i> Products</a>
      <a href="inventory.html"  class="nav-link"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
      <span class="nav-section-label">Records</span>
      <a href="history.html"    class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> Order History</a>
      <a href="reports.html"    class="nav-link"><i class="fa-solid fa-chart-simple"></i> Reports</a>
      <a href="analytics.html"  class="nav-link active"><i class="fa-solid fa-chart-line"></i> Analytics</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><i class="fa-solid fa-circle-user"></i><div><span id="userName">—</span><strong id="userRole" style="font-size:.7rem;color:var(--brown-light)"></strong></div></div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="d-flex align-center">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
        <h1><i class="fa-solid fa-chart-line" style="color:var(--brown-light)"></i> Analytics</h1>
      </div>
      <div class="d-flex align-center gap-2">
        <select id="analyticsDays" class="form-control" style="width:auto;padding:6px 10px;font-size:.85rem" onchange="loadAnalytics()">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
        </select>
      </div>
    </header>

    <main class="page-content">

      <!-- Sales Trend (full width) -->
      <div class="chart-card chart-card-full card mb-2">
        <h3><i class="fa-solid fa-chart-line" style="color:var(--brown-light)"></i> Sales Trend</h3>
        <canvas id="trendChart" style="max-height:280px"></canvas>
      </div>

      <!-- Top Products + Order Status -->
      <div class="charts-grid">
        <div class="chart-card card">
          <h3><i class="fa-solid fa-trophy" style="color:var(--brown-light)"></i> Top Products (Units Sold)</h3>
          <canvas id="topBarChart" style="max-height:300px"></canvas>
        </div>
        <div class="chart-card card">
          <h3><i class="fa-solid fa-chart-pie" style="color:var(--brown-light)"></i> Order Status Distribution</h3>
          <canvas id="statusPieChart" style="max-height:300px"></canvas>
        </div>
      </div>

      <!-- Category Revenue Breakdown -->
      <div class="chart-card card mt-2">
        <h3><i class="fa-solid fa-layer-group" style="color:var(--brown-light)"></i> Revenue by Category</h3>
        <canvas id="categoryChart" style="max-height:260px"></canvas>
      </div>

    </main>
  </div>
</div>
<div id="toast"></div>
<script src="../js/confirm.js"></script>
<script src="../js/admin-analytics.js"></script>
</body>
</html>
